unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-a

set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top
set -sg escape-time 0
# --- Twilight Aesthetic Theme ---

# Status bar background and foreground
set -g status-style bg='#1e1e1e',fg='#8b8378'

# Pane borders
set -g pane-border-style fg='#323232'
set -g pane-active-border-style fg='#8f9d6a'

# Message text
set -g message-style bg='#1e1e1e',fg='#f9ee80'

# Window status format (Inactive)
setw -g window-status-style fg='#8b8378',bg='#1e1e1e'
setw -g window-status-format " #I:#W "

# Window status format (Active)
setw -g window-status-current-style fg='#1e1e1e',bg='#f9ee80',bold
setw -g window-status-current-format " #I:#W "

# Status left (Session name)
set -g status-left-length 30
set -g status-left "#[fg='#8f9d6a',bg='#1e1e1e']  #S #[fg='#8b8378']| "

# Status right (Date/Time)
set -g status-right "#[fg='#8b8378'] %H:%M #[fg='#af5f5f'] %d-%b-%y "

# Bell/Activity alerts
setw -g window-status-bell-style fg='#1e1e1e',bg='#af5f5f'
